name: Automated Model Training

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Clone Eksperimen_SML repository
      run: |
        git clone https://github.com/mirzazulfadhliamin/Eksperimen_SML_Mirza_Zulfadhli_Amin.git
        echo "Eksperimen_SML repository cloned"

    - name: Retrain model with MLflow
      run: |
        mlflow run . -P data_path=Eksperimen_SML_Mirza_Zulfadhli_Amin/preprocessing/customer_churn_preprocessing.csv
      env:
        MLFLOW_TRACKING_URI: ${{ github.workspace }}/mlruns

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: model-artifacts
        path: |
          scripts/*.pkl
          scripts/*.json
          scripts/*.png
          mlruns
        retention-days: 30

    - name: Print summary
      run: |
        echo "========================================="
        echo "WORKFLOW SELESAI!"
        echo "========================================="
        echo "Artifacts generated:"
        ls -la scripts/*.pkl scripts/*.json scripts/*.png 2>/dev/null || echo "No artifacts found"
        echo "========================================="
